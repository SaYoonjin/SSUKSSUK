# =========================
# PROD PROFILE - Docker 환경용
# =========================

server.port=8080

# ===== DB (컨테이너명: mysql) =====
spring.datasource.url=jdbc:mysql://mysql:3306/${MYSQL_DATABASE:ssukssuk}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:ssafy}
spring.datasource.password=${MYSQL_PASSWORD:ssafy}

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ===== Redis (컨테이너명: redis) =====
spring.data.redis.host=redis
spring.data.redis.port=6379

# ===== MQTT (컨테이너명: mosquitto) =====
mqtt.broker-uri=tcp://mosquitto:1883

# ===== Actuator (Health Check용) =====
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ===== Logging =====
logging.level.root=INFO
logging.level.com.ssukssuk=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
