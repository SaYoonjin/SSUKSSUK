# ===========================================
# Nginx Stub Status (internal metrics endpoint)
# Accessible only from Docker network
# ===========================================

server {
    listen 8080;
    server_name localhost;

    location /nginx_status {
        stub_status on;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 10.0.0.0/8;
        allow 127.0.0.1;
        deny all;
    }

    location / {
        return 404;
    }
}
