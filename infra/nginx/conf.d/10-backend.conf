# ===========================================
# Backend API Reverse Proxy (HTTPS)
# ===========================================

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name i14a103.p.ssafy.io;

    ssl_certificate /etc/letsencrypt/live/i14a103.p.ssafy.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/i14a103.p.ssafy.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Jenkins requires this for special headers
    ignore_invalid_headers off;

    resolver 127.0.0.11 valid=30s;

    location /api/ {
        set $backend backend:8080;
        proxy_pass http://$backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /jenkins/ {
        set $jenkins jenkins:8080;
        proxy_pass http://$jenkins;
        proxy_http_version 1.1;

        # Required headers for Jenkins reverse proxy
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        # Clear Connection header for keepalive (Jenkins official recommendation)
        proxy_set_header Connection "";

        # Disable buffering for CLI and streaming
        proxy_request_buffering off;
        proxy_buffering off;

        # Buffer sizes
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # Timeouts
        proxy_connect_timeout 90;
        proxy_send_timeout 90;
        proxy_read_timeout 90;

        # Cookie 및 Redirect 설정
        proxy_cookie_path /jenkins /jenkins;
        proxy_redirect http://jenkins:8080/jenkins/ https://$host/jenkins/;
        proxy_redirect http:// https://;
    }

    # ===========================================
    # MQTT over WebSocket
    # ===========================================
    location /mqtt {
        set $mosquitto mosquitto:9001;
        proxy_pass http://$mosquitto;
        proxy_http_version 1.1;

        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeout (기본값이 짧아서 연결 끊김 방지)
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location / {
        return 404;
    }
}
