# ===========================================
# Alertmanager Configuration
# ===========================================
# Currently using a noop receiver (logs only).
# To enable real notifications, configure a webhook,
# email, or Slack receiver below.

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'default'
      repeat_interval: 15m

receivers:
  - name: 'default'
    # Slack example (uncomment and configure):
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
    #     channel: '#alerts'
    #     send_resolved: true
    #
    # Discord example (uncomment and configure):
    # webhook_configs:
    #   - url: 'https://discord.com/api/webhooks/YOUR/DISCORD/WEBHOOK'
    #     send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
